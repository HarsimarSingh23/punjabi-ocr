# Render blueprint — single all-in-one web service (free tier).
# The Docker image builds the React frontend and serves it together with the
# FastAPI API, so there is just one service and one URL (no CORS needed).
services:
  - type: web
    name: punjabi-ocr
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      # OCR provider defaults (override in the dashboard if you switch engines)
      - key: OCR_PROVIDER
        value: nvidia
      - key: NVIDIA_MODEL
        value: meta/llama-3.2-11b-vision-instruct
      # Secrets — set these in the Render dashboard (sync:false = not in git)
      - key: NVIDIA_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
