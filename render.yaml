# Render blueprint for the backend (free tier). The frontend deploys separately
# to Cloudflare Pages — see DEPLOY.md.
#
# Native Python runtime keeps free-tier builds fast. A Dockerfile is also
# included if you prefer a container host.
services:
  - type: web
    name: punjabi-ocr-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.2"
      # OCR provider defaults (override in the dashboard if you switch engines)
      - key: OCR_PROVIDER
        value: nvidia
      - key: NVIDIA_MODEL
        value: meta/llama-3.2-11b-vision-instruct
      # Secrets — set these in the Render dashboard (sync:false = not in git)
      - key: NVIDIA_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      # Set to your Cloudflare Pages URL once the frontend is deployed,
      # e.g. https://punjabi-ocr.pages.dev  (use * to bootstrap)
      - key: ALLOWED_ORIGINS
        sync: false
